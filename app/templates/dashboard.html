{% extends "base.html" %}

{% block content %}
<section class="page-header">
  <div class="page-heading">
    <p class="eyebrow">后台</p>
    <h1>仪表盘</h1>
  </div>
</section>

<section class="metric-grid" aria-label="运行概览">
  <article class="panel metric-card">
    <span class="metric-label status-text">启用规则</span>
    <strong class="metric-value">0</strong>
  </article>
  <article class="panel metric-card">
    <span class="metric-label status-text">今日执行</span>
    <strong class="metric-value">0</strong>
  </article>
  <article class="panel metric-card">
    <span class="metric-label status-text">待处理告警</span>
    <strong class="metric-value">0</strong>
  </article>
</section>

<section class="two-column">
  <article class="panel">
    <h2 class="section-heading">最近执行</h2>
    <p class="empty-state">暂无执行记录</p>
  </article>
  <article class="panel">
    <h2 class="section-heading">邮件概览</h2>
    <p class="empty-state">暂无邮件日志</p>
  </article>
</section>
{% endblock %}
