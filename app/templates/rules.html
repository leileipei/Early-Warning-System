{% extends "base.html" %}

{% block content %}
<section class="page-header">
  <div>
    <p class="eyebrow">预警</p>
    <h1>规则</h1>
  </div>
  <a class="button" href="/rules/new">新建规则</a>
</section>

<section class="panel">
  <div class="table-shell">
    <table>
      <thead>
        <tr>
          <th>规则名称</th>
          <th>调度</th>
          <th>状态</th>
          <th>发送方式</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        {% for rule in rules %}
        <tr>
          <td>{{ rule.name }}</td>
          <td>{{ rule.cron_expression }}</td>
          <td>{{ "启用" if rule.enabled else "停用" }}</td>
          <td>{{ "汇总一封" if rule.send_mode == "summary" else "每行一封" }}</td>
          <td>
            <div class="table-actions">
              <a class="button button-secondary" href="/rules/{{ rule.id }}/edit">编辑</a>
              <a class="button button-secondary" href="/rules/{{ rule.id }}/copy">复制</a>
              <form class="inline-form" method="post" action="/rules/{{ rule.id }}/run">
                <button class="button button-secondary" type="submit">手动执行</button>
              </form>
            </div>
          </td>
        </tr>
        {% else %}
        <tr>
          <td colspan="5" class="empty-cell">暂无规则</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
