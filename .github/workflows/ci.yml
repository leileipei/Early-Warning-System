name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - run: python -m pip install -r requirements-dev.lock
      - run: python -m pip check
      - run: ruff check .
      - run: python -m pytest --cov=app --cov-report=term-missing --cov-fail-under=93
      - run: pip-audit -r requirements.lock --strict
